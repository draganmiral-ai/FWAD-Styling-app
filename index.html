<script>
const MODULES=[{id:'m1',num:1,title:'Introduction to Styling in Luxury Retail',titleAr:'مقدمة في التنسيق في تجارة الفخامة',summary:'Why styling is not selling — and why the distinction matters at Ferrari.',duration:18,cards:[{kind:'intro',kicker:'Module 01',title:'Styling, not selling.',body:'Styling at Ferrari is not about selling more. It is about creating a complete, refined experience that reflects the true Ferrari lifestyle.'},{kind:'vs',title:'Selling vs Styling',left:{label:'Selling',items:['One item','Price-focused','Transactional','Guest leaves with a product','Forgettable interaction']},right:{label:'Styling',items:['A complete experience','Value + emotion focused','Relationship-driven','Guest leaves feeling styled','A memorable Ferrari moment']}},{kind:'list',title:'Why styling matters',subtitle:'Four reasons it transforms the floor.',items:[{label:'Emotional connection',body:'Styling links Ferrari heritage and performance to the guest\'s personal occasion.'},{label:'Basket value',body:'A styled guest naturally considers the complete look — not just one item.'},{label:'Guest confidence',body:'Structured recommendations make associates credible and guests at ease.'},{label:'Brand equity',body:'Styling protects Ferrari\'s refinement — balanced pieces, no over-branding.'}]}],quiz:[{q:'What is the difference between selling and styling?',options:['Styling targets higher prices; selling targets lower ones','Selling is one transaction; styling is a complete, relationship-driven experience','Selling is online; styling is in-store','There is no real difference'],correct:1,why:'Selling delivers one item. Styling delivers a complete Ferrari lifestyle experience.'},{q:'Why does styling increase basket value?',options:['Because guests feel pressured to buy more','Because the associate adds items at checkout','Because a styled guest naturally considers the complete look','Because of promotional bundles'],correct:2,why:'When a guest sees a complete look, they buy the look — not just the polo.'},{q:'A styled guest leaves feeling…',options:['Like they got a deal','Pressured into buying','Styled, not just sold to','Confused about the brand'],correct:2}]},{id:'m2',num:2,title:'Understanding Ferrari Styling Identity',titleAr:'فهم هوية فيراري في التنسيق',summary:'The DNA of a Ferrari look — hero, accent, neutral base.',duration:16,cards:[{kind:'intro',kicker:'Module 02',title:'Ferrari styling DNA.',body:'Sport + Luxury + Precision — in every single look.'},{kind:'triad',title:'The three layers of a Ferrari look',items:[{num:'01',label:'Hero piece',body:'The standout item that defines the look.'},{num:'02',label:'Ferrari DNA',body:'A single intentional touch of red, motorsport, or heritage.',accent:true},{num:'03',label:'Neutral base',body:'Black, white, navy or stone — quiet support for the hero.'}]},{kind:'vs',title:'Good vs poor Ferrari styling',left:{label:'Good',items:['Clean polo + trousers + subtle bag','Monochrome base + one red accent','One hero piece, cleanly supported','Subtle branding, quality materials','1–2 accessories — purposeful']},right:{label:'Poor',items:['Heavy logos stacked together','Multiple bold colors competing','Too many statement pieces','Over-accessorized, overwhelming','Full red outfit — no balance']}}],quiz:[{q:'What does "less is more" mean in the Ferrari context?',options:['Sell fewer items','Fewer but more refined choices — one statement piece','Use minimal colors only','Avoid recommending accessories'],correct:1,why:'Less is more = one hero piece, supported cleanly. Not less to sell — less to clutter.'},{q:'What is Ferrari red best used for?',options:['Full outfit base','Accent or highlight','Main dominant color','Replaced with another bright color'],correct:1,why:'Red is an accent — caps, design details, hero pieces. Never the base.'},{q:'Which is a Ferrari styling code?',options:['Heavy logos','Italian elegance — refined, clean, never overdone','Multiple bold colors','Maximalism'],correct:1}]},{id:'m3',num:3,title:'Styling Basics',titleAr:'أساسيات التنسيق',summary:'Fit, color, proportion, occasion, and personal style.',duration:18,cards:[{kind:'intro',kicker:'Module 03',title:'The styling fundamentals.',body:'Fit. Color. Proportion. Occasion. Personal style. Master these and every look improves.'},{kind:'principle',label:'01',title:'Fit',items:['Slim = sharp, performance-inspired','Regular = safe premium, versatile','Relaxed = casual — use carefully with luxury guests','A well-fitted polo communicates premium instantly','Fit is the #1 luxury signal']},{kind:'principle',label:'02',title:'Color',items:['Build on neutrals: black, white, beige, navy','Ferrari red = accent only — cap trim, bag detail, hero pieces','One accent, one intention','Avoid: multiple bold colors, full-red outfits','Black base + white layer + one red accent']},{kind:'principle',label:'03',title:'Proportion',items:['Tight top → relaxed bottom (or vice versa)','Never both extremes at once','Structured piece + fluid piece = modern balance','Layering adds depth: tee + knit + jacket']},{kind:'principle',label:'04',title:'Occasion',items:['Travel: comfort + function + polished accessories','Motorsport: sporty energy + layering + practical bag','Weekend: relaxed but refined — quality basics done well','Evening / Smart: elevated pieces, clean lines, minimal accessories']},{kind:'phrases',title:'Personal style — ask first',good:['"What occasion are you shopping for?"','"Do you prefer subtle or statement?"','"More sporty, casual, or refined?"'],bad:['Recommending by your own taste before asking','Assuming what the guest wants','Defaulting to the bestseller','Skipping the discovery questions']}],quiz:[{q:'The #1 luxury signal is…',options:['Logo size','Fit','Price tag','Color brightness'],correct:1,why:'A well-fitted polo communicates premium instantly. An oversized one reads as casual.'},{q:'Best color foundation for a Ferrari look:',options:['Multiple bold tones','Neutrals — black, white, beige, navy','All red, head to toe','Pastel mix'],correct:1},{q:'Good proportion advice:',options:['Tight on top + tight on bottom','Loose on top + loose on bottom','Tight top + relaxed bottom (or vice versa)','Avoid layering entirely'],correct:2},{q:'For a travel occasion, lead with…',options:['Multiple statement pieces','Comfort + function + polished accessories','Heavy formal pieces','Full red outfit'],correct:1},{q:'Before recommending, you should…',options:['Trust your own taste first','Ask about occasion, preference, and style','Pick the most expensive item','Show the newest arrival'],correct:1}]},{id:'m4',num:4,title:'Building a Complete Look',titleAr:'بناء الإطلالة الكاملة',summary:'The 5-step styling formula.',duration:20,cards:[{kind:'intro',kicker:'Module 04',title:'The 5-step styling formula.',body:'Hero → Support → Accessories → Balance → Personalize.'},{kind:'step',step:1,title:'Hero piece.',body:'Start with the standout item the guest chose or is drawn to.'},{kind:'step',step:2,title:'Support.',body:'Add clean complementary items — trousers, knitwear, outerwear.'},{kind:'step',step:3,title:'Accessories.',body:'Introduce 1–2 finishing touches — cap, bag, sunglasses.'},{kind:'step',step:4,title:'Balance.',body:'Step back: too busy? Too plain? Adjust to achieve balance.'},{kind:'step',step:5,title:'Personalize.',body:'Connect the look to the guest\'s lifestyle and occasion.'}],quiz:[{q:'What is the first step?',options:['Accessories','Hero piece','Personalize','Support'],correct:1},{q:'When do you add accessories?',options:['First, to anchor the look','After support pieces (step 3)','Only on request','Never'],correct:1},{q:'Step 4 (Balance) means…',options:['Counting the items','Stepping back to check it\'s not too busy or too plain','Adjusting the price','Switching pieces randomly'],correct:1},{q:'The final step is to…',options:['Pack the items','Personalize the look to the guest','Add more accessories','Recommend footwear'],correct:1}]},{id:'m5',num:5,title:'Accessories & Recommendation',titleAr:'الإكسسوارات والتوصية',summary:'Caps, bags, eyewear, footwear — and the language that makes a recommendation land.',duration:18,cards:[{kind:'intro',kicker:'Module 05',title:'Accessories — the finishing touch.',body:'They complete the look. They never overpower it.'},{kind:'grid4',title:'The accessory categories',items:[{num:'01',label:'Caps & visors',body:'Sporty or casual looks. Add a subtle brand element.'},{num:'02',label:'Keychains',body:'A premium Ferrari collectible and gifting essential.'},{num:'03',label:'Bags & travel bags',body:'Practical function + polished finish for travel looks.'},{num:'04',label:'Wallets & cardholders',body:'Premium gifting, small leather goods upgrade.'},{num:'05',label:'Sunglasses',body:'Statement accessory for outdoor or motorsport occasions.'}]},{kind:'rule',title:'The 1–2 rule',body:'1–2 accessories maximum per look. They complete the look — they do not overpower it.'},{kind:'phrases',title:'How to recommend',good:['"To complete the look, I\'d add this cap…"','"This adds a subtle Ferrari touch…"','"For travel, this is very practical and polished…"','"This would complement your look perfectly."'],bad:['"You should buy this too"','"This is very popular" (generic)','"Do you want accessories?" (too blunt)','"This is on promotion" (transactional)']},{kind:'list',title:'Footwear — Puma × Scuderia',subtitle:'Always recommend a pair when styling.',items:[{label:'Speedcat',body:'The iconic driving shoe — heritage silhouette.'},{label:'SF Race',body:'Bold dark colourway — motorsport energy.'},{label:'Drift Cat',body:'Clean white — versatile luxury everyday.'},{label:'Drift Cat Red',body:'Statement red — complete the look.'}]}],quiz:[{q:'Maximum accessories per look:',options:['1–2','3–4','As many as suit','No limit'],correct:0},{q:'Which phrase is good recommendation language?',options:['"You should buy this too"','"This adds a subtle Ferrari touch…"','"This is on promotion"','"Do you want accessories?"'],correct:1},{q:'Footwear should be…',options:['Recommended only if asked','Always recommended when styling','Avoided unless red','Sold separately later'],correct:1}]},{id:'m6',num:6,title:'Styling by Guest Profile',titleAr:'التنسيق حسب الضيف',summary:'Six guest profiles and how to style for each.',duration:16,cards:[{kind:'intro',kicker:'Module 06',title:'Know your guest — style accordingly.',body:'Six profiles. Six approaches. Read the cues before recommending.'},{kind:'profiles',items:[{num:'01',label:'Ferrari enthusiast',body:'Signal: asks about logos, motorsport.',cue:'→ Lead with bold polo or race cap'},{num:'02',label:'Luxury lifestyle',body:'Signal: subtle, elegant, avoids logos.',cue:'→ Lead with quality knitwear or jacket'},{num:'03',label:'Gift guest',body:'Signal: unsure, needs guidance.',cue:'→ Lead with wallet or cardholder'},{num:'04',label:'First-time guest',body:'Signal: curious, asks questions.',cue:'→ Lead with Ferrari storytelling and heritage'},{num:'05',label:'Motorsport event',body:'Signal: from / going to a race.',cue:'→ Lead with comfortable base + cap + bag'},{num:'06',label:'Fashion-forward',body:'Signal: style-conscious, modern.',cue:'→ Lead with one statement item + sneakers'}]}],quiz:[{q:'Luxury lifestyle guest prefers…',options:['Heavy logos and red','Subtle, elegant, avoids logos','Motorsport polos','Caps and visors'],correct:1},{q:'For a first-time guest, lead with…',options:['The newest item','A promotion','Ferrari storytelling','The most expensive piece'],correct:2},{q:'A gift guest typically needs…',options:['Aggressive upsell','Guidance — caps, bags, small accessories work well','Only the highest tier','No styling — quick purchase'],correct:1}]},{id:'m7',num:7,title:'The Styling Conversation',titleAr:'محادثة التنسيق',summary:'Open. Discover. Recommend. Build. Close.',duration:14,cards:[{kind:'intro',kicker:'Module 07',title:'Conversation flow — 5 steps.',body:'A repeatable rhythm for every styling interaction.'},{kind:'flow',items:[{num:'01',label:'Open',body:'Warm welcome, create comfort.'},{num:'02',label:'Discover',body:'Ask 2–3 questions: occasion + preference.'},{num:'03',label:'Recommend',body:'Suggest hero piece aligned to answers.'},{num:'04',label:'Build',body:'Add support pieces + 1–2 accessories.'},{num:'05',label:'Close',body:'Reinforce the look, invite to try.'}]},{kind:'example',label:'Example dialogue',body:'Guest: "Just looking for a polo." → Associate: "Of course — is this for something specific or more everyday wear? I ask because we have a great option that also pairs really well with our latest season collection pants and a cap for a complete Ferrari weekend look."'},{kind:'principle',label:'05',title:'Key language principles',items:['Speak calmly and confidently — reduce pressure, not energy','Use collaborative language: "we", "let\'s", "I\'d suggest"','Always explain why: "this works because…"','One accessory offer max per interaction — never stack upsells']},{kind:'list',title:'Role plays to practice',items:[{label:'Entry-level guest',body:'New to Ferrari — needs education and storytelling.'},{label:'Hesitant guest',body:'Has budget concerns — needs value reinforcement.'},{label:'High-value guest',body:'Luxury mindset — expects refined discretion.'}]}],quiz:[{q:'How many discovery questions should you ask?',options:['None — just recommend','2–3','5–6','Until they buy'],correct:1},{q:'What comes after Recommend?',options:['Open','Discover','Build','Close'],correct:2},{q:'The last step is…',options:['Discover','Build','Close — reinforce, invite to try','Open'],correct:2}]},{id:'m8',num:8,title:'Common Styling Mistakes',titleAr:'الأخطاء الشائعة',summary:'Six mistakes — and how to fix each.',duration:14,cards:[{kind:'intro',kicker:'Module 08',title:'Avoid these 6 mistakes.',body:'Each one has a simple fix. Practice spotting them on the floor.'},{kind:'mistakes',items:[{num:'01',mistake:'Too many logos',fix:'Feature one statement piece, simplify the rest.'},{num:'02',mistake:'Ignoring fit',fix:'Always recommend the correct size and cut.'},{num:'03',mistake:'Over-accessorizing',fix:'Apply the 1–2 rule strictly, always purposeful.'},{num:'04',mistake:'Styling by personal taste',fix:'Always ask first — recommend second.'},{num:'05',mistake:'Pushy recommendations',fix:'One natural offer, then respect the answer.'},{num:'06',mistake:'Not explaining why',fix:'Always give a styling reason for each piece.'}]}],quiz:[{q:'Fix for "too many logos" is…',options:['Add more bold pieces','Feature one statement piece, simplify the rest','Switch to all red','Remove all accessories'],correct:1},{q:'Which is a styling mistake?',options:['Asking 2–3 discovery questions','Styling by personal taste before asking','Explaining why each piece works','Recommending footwear'],correct:1},{q:'Every piece in a look should have…',options:['A discount','A styling reason','A logo','A red accent'],correct:1}]},{id:'m9',num:9,title:'Practical Activities',titleAr:'الأنشطة التطبيقية',summary:'Four exercises to practice on the floor.',duration:60,cards:[{kind:'intro',kicker:'Module 09',title:'Floor activities.',body:'Four exercises · 15 minutes each. Run them with your supervisor.'},{kind:'activity',num:'01',mins:15,title:'Build the look',body:'Given one hero item, build a full outfit using the 5-Step Formula. Present to the group with reasoning.'},{kind:'activity',num:'02',mins:15,title:'Good · Better · Best',body:'Good = 1 item · Better = hero + support · Best = full look + accessories + Ferrari storytelling.'},{kind:'activity',num:'03',mins:15,title:'Role play',body:'Full styling conversation from open to close. Rotate: guest / associate / observer. Observer scores.'},{kind:'activity',num:'04',mins:15,title:'Occasion match',body:'Five guest descriptions. Match each to the correct occasion and build an appropriate look.'}],quiz:[{q:'In Good · Better · Best, the "Best" level includes…',options:['Just a hero piece','Hero + support','Full look + accessories + Ferrari storytelling','Discount + bundling'],correct:2},{q:'In Role Play, the third role is…',options:['Cashier','Observer who scores','Manager','Stockroom assistant'],correct:1},{q:'Build the look exercise uses…',options:['The 1–2 rule only','The 5-Step Formula','Personal preference','A coin flip'],correct:1}]},{id:'m10',num:10,title:'Assessment & Certification',titleAr:'التقييم والشهادة',summary:'The role-play scorecard — and how to earn certification.',duration:12,cards:[{kind:'intro',kicker:'Module 10',title:'Role-play assessment scorecard.',body:'Five skills · scored out of 5 each. Pass at 80%. Excellent at 90%+.'},{kind:'scorecard',items:[{num:'01',skill:'Discovery questions asked naturally',pass:'≥ 4'},{num:'02',skill:'Product and fit knowledge demonstrated',pass:'≥ 4'},{num:'03',skill:'Styling logic and reasoning explained',pass:'≥ 4'},{num:'04',skill:'Accessories recommended without pressure',pass:'≥ 4'},{num:'05',skill:'Ferrari brand language and tone used',pass:'≥ 4'}]},{kind:'cert-cta',title:'You\'re ready.',body:'Complete this final quiz to earn your Styling Fundamentals certificate.'}],quiz:[{q:'Passing score for role-play certification:',options:['60%','70%','80%','95%'],correct:2},{q:'Excellent score is…',options:['70%+','80%+','85%+','90%+'],correct:3},{q:'Each skill is rated out of…',options:['3','5','10','100'],correct:1}]}];

<!-- ═══ CLAUDE MOCK ═══ -->
<script type="text/babel">
window.claude = {
  complete: async function(prompt) {
    await new Promise(r => setTimeout(r, 700 + Math.random() * 600));
    const staffMessages = prompt.match(/Staff: ([^\n]+)/g) || [];
    const lastQ = (staffMessages.length > 0 ? staffMessages[staffMessages.length-1].replace('Staff: ','') : '').toLowerCase();
    if (lastQ.match(/\b(polo|shirt|tee|knitwear|jacket|top)\b/))
      return 'Start with the polo as your hero piece, then build support. Clean chinos or tailored trousers work best underneath. Finish with one accessory — a cap or crossbody bag adds that Ferrari touch without overdoing it.';
    if (lastQ.match(/\b(drift cat|speedcat|sf race|sneaker|shoe|footwear|puma)\b/))
      return 'Always recommend footwear when completing a look — it\'s the finishing touch. The Drift Cat Red is ideal for statement-conscious guests who want one bold element. Speedcat works for the heritage enthusiast; SF Race for the motorsport crowd.';
    if (lastQ.match(/\b(logo|brand|branding|too much|overbranded|stacking)\b/))
      return 'The rule: one statement branded piece maximum. Build the rest of the look around neutrals. A guest in a heritage polo doesn\'t need a logo cap and a logo bag — that reads as cluttered, not Ferrari.';
    if (lastQ.match(/\b(fit|size|slim|regular|relaxed|oversized)\b/))
      return 'Fit is the #1 luxury signal — mention it early. A well-fitted polo communicates premium instantly. If a guest is between sizes, recommend the slimmer option unless they\'ve said they prefer comfort. Always explain why.';
    if (lastQ.match(/\b(color|colour|red|black|white|neutral|palette)\b/))
      return 'Build on neutrals: black, white, beige, or navy as the base. Ferrari red enters as an accent — one piece, one intention. Never full red. A black base + white layer + one red accent is the cleanest Ferrari formula.';
    if (lastQ.match(/\b(accessory|accessories|cap|bag|sunglass|wallet|keychain)\b/))
      return 'Maximum 1–2 accessories per look. They complete, they don\'t overpower. Introduce them naturally: "To finish this look, I\'d add this cap — it adds a subtle Ferrari touch." That phrasing lands better than "do you want a cap?"';
    if (lastQ.match(/\b(open|welcome|greet|start|greeting)\b/))
      return 'Open with a warm welcome, no pressure: "Welcome — is there anything specific you\'re looking for today, or would you like me to show you what\'s new?" Creates space for the guest to set the direction.';
    if (lastQ.match(/\b(discover|question|ask|occasion)\b/))
      return 'Ask 2–3 focused questions: "What\'s the occasion?" then "Do you prefer something more sporty or elevated?" That\'s usually enough to identify the guest profile and pick your hero piece.';
    if (lastQ.match(/\b(close|closing|invite|try|finish)\b/))
      return 'Close by reinforcing the complete look: "This is a great Ferrari combination — the polo gives you the heritage element, and the trousers keep it clean and elevated. Would you like to try it on?" Confidence without pressure.';
    if (lastQ.match(/\b(luxury|elegant|subtle|upscale|lifestyle)\b/))
      return 'For the luxury-lifestyle guest, lead with quality over logos — knitwear, outerwear, refined materials. Avoid multiple branded pieces. One subtle Ferrari accent is the right level for this profile.';
    if (lastQ.match(/\b(gift|gifting|present)\b/))
      return 'Gift guests often need guidance. Start with universally appealing items — wallets, cardholders, keychains. Ask: "Is this for someone who\'s a Ferrari fan, or more of a lifestyle gift?" That narrows it immediately.';
    if (lastQ.match(/\b(mistake|wrong|bad|avoid|not)\b/))
      return 'The 6 common mistakes: too many logos, ignoring fit, over-accessorizing, styling by your own taste, pushy recommendations, and not explaining why. Fix: always ask first, give a reason for every piece, apply the 1–2 accessory rule.';
    if (lastQ.match(/\b(why|explain|reason|because)\b/))
      return 'Always explain the reason for each piece: "This works because it keeps the palette clean and lets the polo be the focal point." A guest who understands why they\'re buying something leaves feeling styled — not sold to.';
    if (lastQ.match(/\b(5.step|formula|steps|formula)\b/))
      return 'Hero → Support → Accessories → Balance → Personalize. Start with the hero piece the guest is drawn to. Add clean support (trousers, knitwear). Introduce 1–2 accessories. Step back and check the balance. Then connect it to their occasion.';
    const defaults = [
      'Apply the 5-Step Formula: hero piece first, then support, then 1–2 accessories max. Always ask 2–3 discovery questions before recommending — it makes every suggestion land better.',
      'The core Ferrari styling principle: one statement piece, clean support, one accent. Less is always more polished in luxury retail.',
      'Ask about the occasion first — travel, motorsport, weekend, or smart-casual — then pick the hero piece that fits. The rest of the look follows naturally.',
      'Give a styling reason for every piece you recommend. "This works because…" is more compelling than "this is nice" or "this is popular."',
    ];
    return defaults[Math.floor(Math.random() * defaults.length)];
  }
};
</script>

<script type="text/babel">
const C={cream:'#f6f4ed',cream2:'#ede8de',paper:'#fbfaf5',ink:'#1a1411',ink2:'#3a322d',muted:'#85786a',line:'#d9d2c4',line2:'#e8e3d7',crimson:'#8b2620',crimsonSoft:'#f3d8d4',gold:'#a07a3a'};
window.C=C;
const FONT={serif:'"Instrument Serif",Georgia,serif',sans:'"Geist",-apple-system,system-ui,sans-serif',mono:'"JetBrains Mono",ui-monospace,monospace'};
window.FONT=FONT;

function Mono({children,color,size=11,style={},as='div'}){const Tag=as;return <Tag style={{fontFamily:FONT.mono,fontSize:size,letterSpacing:'0.14em',textTransform:'uppercase',color:color||C.muted,...style}}>{children}</Tag>;}
function Serif({children,size=32,color,italic=true,style={},as='div'}){const Tag=as;return <Tag style={{fontFamily:FONT.serif,fontStyle:italic?'italic':'normal',fontSize:size,letterSpacing:'-0.015em',lineHeight:0.96,color:color||C.ink,...style}}>{children}</Tag>;}
function Kicker({children,color,accent=false,style={}}){return <div style={{display:'flex',alignItems:'center',gap:10,...style}}><div style={{width:18,height:1,background:color||(accent?C.crimson:C.ink2)}}/><Mono color={color||(accent?C.crimson:C.ink2)} size={10}>{children}</Mono></div>;}
function Pill({children,accent,bg,color,style={}}){return <span style={{display:'inline-flex',alignItems:'center',gap:6,fontFamily:FONT.mono,fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',padding:'5px 10px',borderRadius:999,background:bg||(accent?C.crimsonSoft:'#0000000a'),color:color||(accent?C.crimson:C.ink2),...style}}>{children}</span>;}
function Card({children,dark=false,style={},onClick,...rest}){return <div onClick={onClick} style={{background:dark?'#1a1411':C.paper,color:dark?C.cream:C.ink,borderRadius:18,border:`1px solid ${dark?'#2a221c':C.line2}`,padding:18,cursor:onClick?'pointer':'default',...style}} {...rest}>{children}</div>;}
function Btn({children,onClick,variant='primary',disabled=false,style={},leading,trailing,full=true}){const variants={primary:{bg:C.ink,color:C.cream,border:'transparent'},accent:{bg:C.crimson,color:'#fff',border:'transparent'},ghost:{bg:'transparent',color:C.ink,border:C.line},cream:{bg:C.cream2,color:C.ink,border:'transparent'}};const v=variants[variant]||variants.primary;return <button onClick={onClick} disabled={disabled} style={{display:full?'flex':'inline-flex',width:full?'100%':'auto',alignItems:'center',justifyContent:'center',gap:10,padding:'15px 20px',borderRadius:999,background:v.bg,color:v.color,border:`1px solid ${v.border}`,fontFamily:FONT.sans,fontWeight:500,fontSize:15,letterSpacing:'-0.01em',cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1,transition:'transform 0.1s ease,opacity 0.15s ease',...style}}>{leading}<span>{children}</span>{trailing}</button>;}
function IconBtn({children,onClick,size=36,style={},ariaLabel}){return <button onClick={onClick} aria-label={ariaLabel} style={{width:size,height:size,padding:0,display:'inline-flex',alignItems:'center',justifyContent:'center',background:'rgba(26,20,17,0.05)',border:'1px solid '+C.line2,borderRadius:999,cursor:'pointer',color:C.ink,...style}}>{children}</button>;}
function ProgressBar({value,total,accent=false,height=4,label}){const pct=total>0?Math.max(0,Math.min(1,value/total)):0;return <div>{label&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><Mono size={10}>{label}</Mono><Mono size={10} color={accent?C.crimson:C.ink}>{Math.round(pct*100)}%</Mono></div>}<div style={{height,background:C.line2,borderRadius:999,overflow:'hidden'}}><div style={{height:'100%',width:`${pct*100}%`,background:accent?C.crimson:C.ink,transition:'width 0.5s cubic-bezier(0.2,0.8,0.2,1)'}}/></div></div>;}
function NumeralBadge({children,size=56,color,style={}}){return <span style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:size,color:color||C.crimson,lineHeight:0.9,...style}}>{children}</span>;}
function ChromeTag({left,right,style={}}){return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 20px 0',...style}}><Mono size={9}>{left}</Mono>{right&&<Mono size={9}>{right}</Mono>}</div>;}
function ScreenScroll({children,padBottom=110,style={}}){return <div style={{height:'100%',overflowY:'auto',overflowX:'hidden',paddingBottom:padBottom,WebkitOverflowScrolling:'touch',...style}}>{children}</div>;}
function Sheet({open,onClose,children,height=0.7}){if(!open)return null;return <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(20,16,14,0.5)',zIndex:200,display:'flex',alignItems:'flex-end',animation:'sheetFade 0.2s ease'}}><div onClick={e=>e.stopPropagation()} style={{background:C.cream,width:'100%',height:`${height*100}%`,borderRadius:'24px 24px 0 0',padding:'12px 22px 24px',boxSizing:'border-box',overflowY:'auto',animation:'sheetSlide 0.25s cubic-bezier(0.2,0.8,0.2,1)'}}><div style={{width:40,height:4,background:C.line,borderRadius:999,margin:'0 auto 16px'}}/>{children}</div></div>;}
function Logo({size=24,color}){const c=color||C.ink;return <div style={{display:'inline-flex',alignItems:'center',gap:8}}><svg width={size} height={size} viewBox="0 0 32 32"><circle cx="16" cy="16" r="15" fill="none" stroke={c} strokeWidth="1.5"/><path d="M 9 22 L 16 8 L 23 22" fill="none" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/><circle cx="16" cy="22" r="2" fill={C.crimson}/></svg></div>;}
function Stack({gap=16,children,style={},...rest}){return <div style={{display:'flex',flexDirection:'column',gap,...style}} {...rest}>{children}</div>;}
function Row({gap=12,children,align='center',justify='flex-start',style={},...rest}){return <div style={{display:'flex',flexDirection:'row',gap,alignItems:align,justifyContent:justify,...style}} {...rest}>{children}</div>;}
function Icon({name,size=20,color='currentColor'}){const s={width:size,height:size,fill:'none',stroke:color,strokeWidth:1.5,strokeLinecap:'round',strokeLinejoin:'round'};const map={home:<svg viewBox="0 0 24 24" {...s}><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg>,trophy:<svg viewBox="0 0 24 24" {...s}><path d="M8 4h8v4a4 4 0 01-8 0V4z"/><path d="M16 6h2a2 2 0 01-2 4M8 6H6a2 2 0 002 4"/><path d="M9 14h6l-1 4h-4l-1-4zM7 22h10"/></svg>,chat:<svg viewBox="0 0 24 24" {...s}><path d="M4 6h16v10H8l-4 4V6z"/></svg>,user:<svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 4-6 8-6s7 2 8 6"/></svg>,arrow:<svg viewBox="0 0 24 24" {...s}><path d="M5 12h14M13 6l6 6-6 6"/></svg>,arrowLeft:<svg viewBox="0 0 24 24" {...s}><path d="M19 12H5M11 6l-6 6 6 6"/></svg>,check:<svg viewBox="0 0 24 24" {...s}><path d="M5 12l5 5L20 7"/></svg>,lock:<svg viewBox="0 0 24 24" {...s}><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>,qr:<svg viewBox="0 0 24 24" {...s}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3h-3zM20 14v3M14 20h3M20 20h1"/></svg>,close:<svg viewBox="0 0 24 24" {...s}><path d="M6 6l12 12M18 6L6 18"/></svg>,send:<svg viewBox="0 0 24 24" {...s}><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>,flame:<svg viewBox="0 0 24 24" {...s}><path d="M12 3c0 4-5 5-5 11a5 5 0 0010 0c0-3-2-4-2-7-2 1-3 0-3-4z"/></svg>,settings:<svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="12" r="3"/><path d="M19 12l2-1-1-3-2 1-2-1-1-2h-4l-1 2-2 1-2-1-1 3 2 1v0l-2 1 1 3 2-1 2 1 1 2h4l1-2 2-1 2 1 1-3-2-1z"/></svg>,medal:<svg viewBox="0 0 24 24" {...s}><circle cx="12" cy="15" r="6"/><path d="M8 9L5 3h4l3 5M16 9l3-6h-4l-3 5"/></svg>,sparkle:<svg viewBox="0 0 24 24" {...s}><path d="M12 3l1.5 5L19 9l-5.5 1L12 15l-1.5-5L5 9l5.5-1L12 3z"/><path d="M19 16l.7 2 2 .7-2 .7L19 21l-.7-1.6-2-.7 2-.7z"/></svg>};return map[name]||null;}
Object.assign(window,{Pill,Kicker,Serif,Mono,Card,Btn,IconBtn,ProgressBar,NumeralBadge,ChromeTag,ScreenScroll,Sheet,Logo,Stack,Row,Icon});
