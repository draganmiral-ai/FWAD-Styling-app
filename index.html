<!-- ═══ SCREENS — FLOW ═══ -->
<script type="text/babel">
function ScreenAuth({t,onJoin}){const[stage,setStage]=React.useState('scan');const[name,setName]=React.useState('');const[branch,setBranch]=React.useState('FWAD Main');const[code,setCode]=React.useState('');const[scanning,setScanning]=React.useState(false);const doScan=()=>{setScanning(true);setTimeout(()=>{setScanning(false);setStage('profile');},1100);};if(stage==='scan'){return(<ScreenScroll padBottom={40} style={{background:'#0f0a08'}}><ChromeTag left="FWAD · ABUDHABI" right="RETAIL STYLING" style={{color:'#fff'}}/><div style={{padding:'40px 24px 24px',color:C.cream}}><Kicker accent style={{marginBottom:18}}>{t.scan}</Kicker><Serif size={42} color={C.cream}>Welcome to<br/>the Floor.</Serif><div style={{fontFamily:FONT.sans,fontSize:14,color:'rgba(255,255,255,0.7)',marginTop:14,lineHeight:1.5}}>{t.scanHelp}</div></div><div style={{padding:'0 24px'}}><div onClick={!scanning?doScan:null} style={{position:'relative',aspectRatio:'1/1',borderRadius:22,background:'radial-gradient(circle at 30% 20%,rgba(139,38,32,.18),transparent 60%),#1a120f',border:'1px solid #2a201b',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden'}}>{[{top:16,left:16,borderTop:1,borderLeft:1},{top:16,right:16,borderTop:1,borderRight:1},{bottom:16,left:16,borderBottom:1,borderLeft:1},{bottom:16,right:16,borderBottom:1,borderRight:1}].map((p,i)=><div key={i} style={{position:'absolute',width:28,height:28,borderTop:p.borderTop?'2px solid '+C.crimson:'none',borderBottom:p.borderBottom?'2px solid '+C.crimson:'none',borderLeft:p.borderLeft?'2px solid '+C.crimson:'none',borderRight:p.borderRight?'2px solid '+C.crimson:'none',...p}}/>)}<div style={{opacity:.85}}><Icon name="qr" size={86} color={C.crimson}/></div>{scanning&&<div style={{position:'absolute',left:16,right:16,height:2,background:C.crimson,boxShadow:'0 0 12px '+C.crimson,animation:'scanLine 1s ease-in-out'}}/>}<Mono size={9} style={{position:'absolute',bottom:36,color:'rgba(255,255,255,.55)'}}>{scanning?'scanning…':t.tapToScan}</Mono></div></div><div style={{padding:'24px',textAlign:'center'}}><Mono size={10} color="rgba(255,255,255,.5)" style={{marginBottom:10}}>{t.enterCode}</Mono><input value={code} onChange={e=>setCode(e.target.value)} placeholder={t.codePlaceholder} style={{width:'100%',padding:'14px 18px',background:'#1a120f',border:'1px solid #2a201b',borderRadius:14,color:C.cream,fontFamily:FONT.mono,fontSize:14,letterSpacing:'0.12em',textAlign:'center',textTransform:'uppercase',boxSizing:'border-box'}}/>{code.length>=6&&<Btn variant="accent" onClick={()=>setStage('profile')} style={{marginTop:14}}>Continue with code</Btn>}</div></ScreenScroll>);}return(<ScreenScroll padBottom={40}><ChromeTag left="FWAD · ABUDHABI" right="ONBOARDING"/><div style={{padding:'36px 24px 18px'}}><Kicker accent style={{marginBottom:18}}>One last step</Kicker><Serif size={48}>Let's set you up.</Serif><div style={{fontSize:14,color:C.ink2,marginTop:12,lineHeight:1.5}}>We'll save your progress on this device.</div></div><div style={{padding:'12px 24px'}}><Mono size={10} style={{marginBottom:8}}>{t.yourName}</Mono><input value={name} onChange={e=>setName(e.target.value)} placeholder={t.namePlaceholder} style={{width:'100%',padding:'14px 16px',background:C.paper,border:'1px solid '+C.line,borderRadius:12,color:C.ink,fontFamily:FONT.sans,fontSize:16,boxSizing:'border-box',marginBottom:18}}/><Mono size={10} style={{marginBottom:8}}>{t.branch}</Mono><div style={{display:'flex',gap:8,marginBottom:30}}>{['FWAD Main','FWAD Pop-up','Galleria'].map(b=><button key={b} onClick={()=>setBranch(b)} style={{flex:1,padding:'12px 8px',background:branch===b?C.ink:'transparent',color:branch===b?C.cream:C.ink,border:'1px solid '+(branch===b?C.ink:C.line),borderRadius:12,fontFamily:FONT.sans,fontSize:13,fontWeight:500,cursor:'pointer'}}>{b}</button>)}</div><Btn variant="accent" disabled={name.trim().length<2} onClick={()=>onJoin({name:name.trim(),branch})} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{t.start}</Btn></div></ScreenScroll>);}

function ScreenHome({t,state,onOpenModule}){const completedCount=state.completed.length;const totalModules=MODULES.length;const firstIncomplete=MODULES.find(m=>!state.completed.includes(m.id));const lastCompleted=state.completed.length>0;return(<ScreenScroll><ChromeTag left="FWAD · ABUDHABI" right={`VOL. 01 · 2026`}/><div style={{padding:'30px 22px 14px'}}><Kicker accent style={{marginBottom:14}}>{lastCompleted?t.welcomeBack:t.welcomeFirst} · {state.profile.name.split(' ')[0]}</Kicker><Serif size={42} style={{marginBottom:4}}>Styling,</Serif><Serif size={42} italic={false} style={{fontFamily:FONT.sans,fontWeight:300,color:C.ink}}>not selling.</Serif></div><div style={{margin:'0 22px 18px',borderRadius:18,overflow:'hidden',height:168,position:'relative'}}><img src={window.MODULE_IMGS&&window.MODULE_IMGS.store} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center 30%'}} alt=''/><div style={{position:'absolute',inset:0,background:'linear-gradient(to top,rgba(20,16,14,.55),transparent 65%)'}}></div><div style={{position:'absolute',bottom:14,left:16}}><Mono size={9} color='rgba(255,255,255,.75)'>Ferrari World Abu Dhabi · Main Floor</Mono></div></div><div style={{padding:'18px 22px 0'}}><Card style={{background:C.ink,color:C.cream,padding:20}}><Row justify="space-between" align="flex-start"><div><Mono color="rgba(255,255,255,.55)" size={10}>{t.yourProgress}</Mono><div style={{marginTop:6,fontFamily:FONT.sans,fontSize:13}}><span style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:38,color:C.cream}}>{completedCount}</span><span style={{color:'rgba(255,255,255,.55)'}}> / {totalModules} </span><span style={{color:'rgba(255,255,255,.7)'}}>{t.modulesComplete}</span></div></div><div style={{textAlign:'right'}}><Mono color="rgba(255,255,255,.55)" size={10}>{t.xp}</Mono><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:38,color:C.crimson,lineHeight:1}}>{state.xp}</div></div></Row><div style={{marginTop:16}}><ProgressBar value={completedCount} total={totalModules} accent height={3}/></div>{firstIncomplete&&<Btn variant="accent" style={{marginTop:18}} onClick={()=>onOpenModule(firstIncomplete.id)} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{lastCompleted?t.continueLesson:t.start}: M{firstIncomplete.num.toString().padStart(2,'0')}</Btn>}</Card></div><div style={{padding:'28px 22px 0'}}><Row justify="space-between" style={{marginBottom:14}}><Kicker>10 modules</Kicker><Mono size={10}>{Math.round((completedCount/totalModules)*100)}% complete</Mono></Row><Stack gap={10}>{MODULES.map((m,i)=>{const completed=state.completed.includes(m.id);const unlocked=i===0||state.completed.includes(MODULES[i-1].id);return <ModuleListRow key={m.id} m={m} t={t} completed={completed} unlocked={unlocked} onClick={unlocked?()=>onOpenModule(m.id):null}/>;})}</Stack></div>{state.completed.length===MODULES.length&&<div style={{padding:'28px 22px 0'}}><Card style={{background:'linear-gradient(135deg,'+C.crimson+',#5c1419)',color:'#fff',padding:22}}><Row justify="space-between" align="center"><div><Mono color="rgba(255,255,255,.6)" size={10}>{t.certEarned}</Mono><Serif size={36} color="#fff" style={{marginTop:6}}>You did it.</Serif></div><Icon name="medal" size={48} color="#fff"/></Row></Card></div>}</ScreenScroll>);}

function ModuleListRow({m,t,completed,unlocked,onClick}){return <Card onClick={onClick} style={{padding:'16px 16px',opacity:unlocked?1:0.45,borderColor:completed?C.crimson+'40':C.line2,background:completed?'#fbf5f4':C.paper}}><Row justify="space-between" align="center" gap={12}><Row gap={14} align="center" style={{flex:1,minWidth:0}}><div style={{width:44,textAlign:'center',flexShrink:0}}><NumeralBadge size={44} color={completed?C.crimson:C.ink}>{m.num.toString().padStart(2,'0')}</NumeralBadge></div><div style={{flex:1,minWidth:0}}><div style={{fontFamily:FONT.sans,fontSize:15,fontWeight:500,color:C.ink,letterSpacing:'-0.01em',lineHeight:1.25,overflow:'hidden',textOverflow:'ellipsis'}}>{m.title}</div><Mono size={10} style={{marginTop:6}}>{m.cards.length} cards · {m.duration} {t.minutes} · {m.quiz.length}q</Mono></div></Row>{completed?<div style={{width:28,height:28,borderRadius:999,background:C.crimson,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="check" size={16} color="#fff"/></div>:!unlocked?<Icon name="lock" size={18} color={C.muted}/>:<Icon name="arrow" size={18} color={C.ink}/>}</Row></Card>;}

function ScreenModule({t,m,state,onBack,onStartLesson,onQuiz}){const completed=state.completed.includes(m.id);return(<ScreenScroll><div style={{padding:'10px 18px 0'}}><Row justify="space-between" align="center"><IconBtn onClick={onBack} ariaLabel="back"><Icon name="arrowLeft" size={16}/></IconBtn><Mono size={10}>Module {m.num.toString().padStart(2,'0')} / 10</Mono></Row></div>{window.MODULE_IMGS&&window.MODULE_IMGS.mod(m.num)&&<div style={{height:200,overflow:'hidden',position:'relative',marginBottom:-20}}><img src={window.MODULE_IMGS.mod(m.num)} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center'}} alt=''/><div style={{position:'absolute',inset:0,background:'linear-gradient(to top,#f6f4ed 0%,rgba(246,244,237,.25) 55%,transparent 100%)'}}></div></div>}<div style={{padding:'20px 22px 14px'}}><Kicker accent>Module {m.num.toString().padStart(2,'0')}</Kicker><div style={{position:'relative',marginTop:22}}><NumeralBadge size={180} color={C.crimson+'22'} style={{position:'absolute',top:-42,right:-10,pointerEvents:'none'}}>{m.num.toString().padStart(2,'0')}</NumeralBadge><Serif size={44} style={{position:'relative'}}>{m.title}.</Serif></div><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:20,color:C.ink2,marginTop:16,lineHeight:1.35}}>{m.summary}</div></div><div style={{padding:'20px 22px 0'}}><Row gap={10}><Pill><Icon name="sparkle" size={11} color={C.muted}/> {m.cards.length} cards</Pill><Pill>· {m.duration} {t.minutes}</Pill><Pill accent>{m.quiz.length} quiz q's</Pill></Row></div><div style={{padding:'28px 22px 0'}}><Mono size={10} style={{marginBottom:14}}>What you'll learn</Mono><Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{m.cards.filter(c=>c.kind!=='intro').map((c,i)=><Row key={i} gap={14} align="center" style={{padding:'14px 0',borderBottom:'1px solid '+C.line2}}><Mono size={11} color={C.crimson} style={{width:24}}>{(i+1).toString().padStart(2,'0')}</Mono><div style={{fontFamily:FONT.sans,fontSize:15,fontWeight:500,color:C.ink,letterSpacing:'-0.01em'}}>{c.title||cardLabel(c)}</div></Row>)}</Stack></div><div style={{padding:'28px 22px 30px'}}><Btn variant="accent" onClick={onStartLesson} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{completed?t.review:t.startModule}</Btn>{completed&&<Btn variant="ghost" onClick={onQuiz} style={{marginTop:10}}>{t.retry}</Btn>}</div></ScreenScroll>);}

function cardLabel(c){if(c.title)return c.title;if(c.skill)return c.skill;if(c.label)return c.label;return'Lesson card';}

function ScreenLesson({t,m,onBack,onComplete}){const[idx,setIdx]=React.useState(0);const total=m.cards.length;const c=m.cards[idx];const last=idx===total-1;return(<div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{padding:'10px 18px 0',flexShrink:0}}><Row justify="space-between" align="center" style={{marginBottom:14}}><IconBtn onClick={onBack} ariaLabel="back"><Icon name="close" size={16}/></IconBtn><Mono size={10}>M{m.num.toString().padStart(2,'0')} · {(idx+1).toString().padStart(2,'0')} / {total.toString().padStart(2,'0')}</Mono></Row><div style={{display:'flex',gap:4}}>{m.cards.map((_,i)=><div key={i} style={{flex:1,height:2,borderRadius:2,background:i<=idx?C.crimson:C.line2,transition:'background 0.3s'}}/>)}</div></div><div style={{flex:1,overflow:'hidden',position:'relative'}}><div key={idx} style={{height:'100%',overflowY:'auto',animation:'cardIn 0.3s ease'}}><LessonCard c={c} m={m}/></div></div><div style={{padding:'10px 18px',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 18px)',flexShrink:0,background:C.cream,borderTop:'1px solid '+C.line2}}><Row gap={10}>{idx>0&&<Btn variant="ghost" full={false} style={{minWidth:56}} onClick={()=>setIdx(idx-1)} leading={<Icon name="arrowLeft" size={14}/>}>{t.back}</Btn>}{!last&&<Btn variant="primary" onClick={()=>setIdx(idx+1)} trailing={<Icon name="arrow" size={16} color={C.cream}/>}>{t.next}</Btn>}{last&&<Btn variant="accent" onClick={onComplete} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{t.takeQuiz}</Btn>}</Row></div></div>);}

function LessonCard({c,m}){const Wrap=({children})=><div style={{padding:'24px 22px 30px'}}>{children}</div>;
if(c.kind==='intro'){const introImg=window.MODULE_IMGS&&window.MODULE_IMGS.mod(m.num);return(<div>{introImg&&<div style={{height:200,overflow:'hidden',position:'relative'}}><img src={introImg} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'top center'}} alt=''/><div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.35))'}}></div></div>}<Wrap><Kicker accent>{c.kicker}</Kicker><div style={{position:'relative',marginTop:28,marginBottom:22}}><NumeralBadge size={200} color={C.crimson+'14'} style={{position:'absolute',top:-60,right:-20}}>{m.num.toString().padStart(2,'0')}</NumeralBadge><Serif size={50} style={{position:'relative'}}>{c.title}</Serif></div><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:22,color:C.ink2,lineHeight:1.35,marginTop:18}}>"{c.body}"</div></Wrap></div>);}
if(c.kind==='vs')return(<Wrap><Kicker>Compare</Kicker><Serif size={36} style={{marginTop:14,marginBottom:22}}>{c.title}.</Serif><div style={{display:'grid',gap:14}}><VsBlock {...c.left} color={C.ink}/><div style={{textAlign:'center',fontFamily:FONT.serif,fontStyle:'italic',fontSize:36,color:C.crimson,lineHeight:1}}>vs</div><VsBlock {...c.right} color={C.crimson} accent/></div></Wrap>);
if(c.kind==='list')return(<Wrap><Kicker>Module {m.num.toString().padStart(2,'0')}</Kicker><Serif size={36} style={{marginTop:14,marginBottom:8}}>{c.title}.</Serif>{c.subtitle&&<div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:18,color:C.ink2,marginBottom:18}}>{c.subtitle}</div>}<Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{c.items.map((it,i)=><div key={i} style={{padding:'16px 0',borderBottom:'1px solid '+C.line2}}><Row gap={12} align="flex-start"><NumeralBadge size={28}>{(i+1).toString().padStart(2,'0')}</NumeralBadge><div style={{flex:1}}><div style={{fontFamily:FONT.sans,fontSize:16,fontWeight:500,color:C.ink,marginBottom:4}}>{it.label}</div><div style={{fontFamily:FONT.sans,fontSize:14,color:C.ink2,lineHeight:1.45}}>{it.body}</div></div></Row></div>)}</Stack>{c.title&&c.title.includes('Footwear')&&window.MODULE_IMGS&&<div style={{marginTop:22}}><Mono size={9} style={{marginBottom:12}}>Puma × Scuderia Ferrari</Mono><div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>{[{src:window.MODULE_IMGS.shoe1,label:'Speedcat'},{src:window.MODULE_IMGS.shoe2,label:'Drift Cat White'},{src:window.MODULE_IMGS.shoe3,label:'Drift Cat Red'}].map((s,i)=><div key={i} style={{textAlign:'center'}}><div style={{borderRadius:10,overflow:'hidden',background:C.paper,border:'1px solid '+C.line2,aspectRatio:'1',display:'flex',alignItems:'center',justifyContent:'center'}}><img src={s.src} style={{width:'100%',height:'100%',objectFit:'contain',padding:4}} alt={s.label}/></div><Mono size={8} style={{marginTop:6}}>{s.label}</Mono></div>)}</div></div>}</Wrap>);
if(c.kind==='triad')return(<Wrap><Kicker>Module {m.num.toString().padStart(2,'0')}</Kicker><Serif size={36} style={{marginTop:14,marginBottom:22}}>{c.title}.</Serif><Stack gap={12}>{c.items.map((it,i)=><Card key={i} style={{background:it.accent?'#fbf5f4':C.paper,borderColor:it.accent?C.crimson+'30':C.line2}}><Row gap={14} align="flex-start"><NumeralBadge size={44} color={it.accent?C.crimson:C.ink}>{it.num}</NumeralBadge><div style={{flex:1}}><Serif size={28} color={it.accent?C.crimson:C.ink}>{it.label}.</Serif><div style={{fontFamily:FONT.sans,fontSize:14,color:C.ink2,lineHeight:1.45,marginTop:8}}>{it.body}</div></div></Row></Card>)}</Stack></Wrap>);
if(c.kind==='principle')return(<Wrap><Kicker accent>Fundamental {c.label}</Kicker><Serif size={64} style={{marginTop:14,marginBottom:22}}>{c.title}.</Serif><Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{c.items.map((it,i)=><div key={i} style={{padding:'14px 0',borderBottom:'1px solid '+C.line2,fontFamily:FONT.sans,fontSize:15,fontWeight:i===c.items.length-1?500:400,color:i===c.items.length-1?C.ink:C.ink2}}><Row gap={12} align="flex-start"><Mono size={10} color={C.crimson} style={{marginTop:4}}>·</Mono><div style={{flex:1}}>{it}</div></Row></div>)}</Stack></Wrap>);
if(c.kind==='step')return(<Wrap><Kicker accent>Step {c.step} of 5</Kicker><div style={{display:'flex',gap:4,marginTop:14,marginBottom:22}}>{[1,2,3,4,5].map(s=><div key={s} style={{flex:1,height:3,borderRadius:2,background:s<=c.step?C.crimson:C.line2}}/>)}</div><NumeralBadge size={120}>{c.step.toString().padStart(2,'0')}</NumeralBadge><Serif size={56} style={{marginTop:8,marginBottom:18}}>{c.title}</Serif><div style={{fontFamily:FONT.sans,fontSize:17,color:C.ink2,lineHeight:1.5}}>{c.body}</div></Wrap>);
if(c.kind==='grid4'||c.kind==='profiles'||c.kind==='flow')return(<Wrap><Kicker>Module {m.num.toString().padStart(2,'0')}</Kicker><Serif size={36} style={{marginTop:14,marginBottom:c.kind==='grid4'&&m.num===5?12:22}}>{c.title||'Categories'}.</Serif>{c.kind==='grid4'&&m.num===5&&window.MODULE_IMGS&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:18}}><div style={{borderRadius:12,overflow:'hidden',background:C.paper,border:'1px solid '+C.line2,height:108}}><img src={window.MODULE_IMGS.prod_cap} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}} alt='Ferrari cap'/></div><div style={{borderRadius:12,overflow:'hidden',background:C.paper,border:'1px solid '+C.line2,height:108}}><img src={window.MODULE_IMGS.prod_bag} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top'}} alt='Ferrari bag'/></div></div>}<Stack gap={10}>{c.items.map((it,i)=><Card key={i} style={{padding:16}}><Row gap={14} align="flex-start"><NumeralBadge size={36} color={C.crimson}>{it.num}</NumeralBadge><div style={{flex:1}}><div style={{fontFamily:FONT.sans,fontSize:16,fontWeight:500,color:C.ink,marginBottom:4}}>{it.label}</div><div style={{fontFamily:FONT.sans,fontSize:13,color:C.ink2,lineHeight:1.4}}>{it.body}</div>{it.cue&&<div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:16,color:C.ink,marginTop:8}}>{it.cue}</div>}</div></Row></Card>)}</Stack></Wrap>);
if(c.kind==='rule')return(<Wrap><div style={{minHeight:400,display:'flex',flexDirection:'column',justifyContent:'center'}}><Kicker accent>Rule</Kicker><Serif size={42} style={{marginTop:18,marginBottom:18}}>{c.title}</Serif><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:22,color:C.ink2,lineHeight:1.4,paddingLeft:16,borderLeft:'2px solid '+C.crimson}}>{c.body}</div></div></Wrap>);
if(c.kind==='phrases')return(<Wrap><Kicker>Module {m.num.toString().padStart(2,'0')}</Kicker><Serif size={36} style={{marginTop:14,marginBottom:20}}>{c.title}.</Serif><Mono size={10} color={C.ink} style={{marginBottom:10}}>USE THESE ↓</Mono><Stack gap={8} style={{marginBottom:22}}>{c.good.map((p,i)=><div key={i} style={{padding:'12px 14px',background:'#0000000a',borderLeft:'3px solid '+C.ink,borderRadius:6,fontFamily:FONT.serif,fontStyle:'italic',fontSize:16,color:C.ink}}>{p}</div>)}</Stack><Mono size={10} color={C.crimson} style={{marginBottom:10}}>AVOID ↓</Mono><Stack gap={8}>{c.bad.map((p,i)=><div key={i} style={{padding:'12px 14px',background:C.crimsonSoft+'70',borderLeft:'3px solid '+C.crimson,borderRadius:6,fontFamily:FONT.serif,fontStyle:'italic',fontSize:16,color:C.ink2,textDecoration:'line-through',textDecorationColor:C.crimson+'60'}}>{p}</div>)}</Stack></Wrap>);
if(c.kind==='example')return(<Wrap><div style={{minHeight:400,display:'flex',flexDirection:'column',justifyContent:'center'}}><Kicker accent>{c.label}</Kicker><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:24,color:C.ink,lineHeight:1.45,marginTop:16}}>{c.body}</div></div></Wrap>);
if(c.kind==='mistakes')return(<Wrap><Kicker accent>The 6 mistakes</Kicker><Serif size={36} style={{marginTop:14,marginBottom:20}}>Avoid these.</Serif><Stack gap={12}>{c.items.map((it,i)=><Card key={i} style={{padding:14}}><Row gap={12} align="flex-start"><div style={{width:32,fontFamily:FONT.mono,fontSize:12,color:C.crimson,paddingTop:2}}>✗ {it.num}</div><div style={{flex:1}}><div style={{fontFamily:FONT.sans,fontSize:15,fontWeight:500,color:C.ink,marginBottom:4}}>{it.mistake}</div><div style={{fontFamily:FONT.sans,fontSize:13,color:C.ink2,lineHeight:1.4}}><span style={{color:C.ink,fontWeight:500}}>Fix — </span>{it.fix}</div></div></Row></Card>)}</Stack></Wrap>);
if(c.kind==='activity')return(<Wrap><Kicker accent>Activity {c.num}</Kicker><Row justify="space-between" align="baseline" style={{marginTop:14,marginBottom:16}}><NumeralBadge size={90}>{c.num}</NumeralBadge><Mono size={10}>{c.mins} {STRINGS.en.minutes}</Mono></Row><Serif size={40} style={{marginBottom:16}}>{c.title}.</Serif><div style={{fontFamily:FONT.sans,fontSize:16,color:C.ink2,lineHeight:1.55}}>{c.body}</div></Wrap>);
if(c.kind==='scorecard')return(<Wrap><Kicker accent>Assessment</Kicker><Serif size={36} style={{marginTop:14,marginBottom:18}}>Five skills.</Serif><div style={{borderTop:'2px solid '+C.ink}}>{c.items.map((it,i)=><div key={i} style={{padding:'14px 0',borderBottom:'1px solid '+C.line2}}><Row gap={14} align="flex-start"><Mono size={11} color={C.crimson} style={{width:24,marginTop:2}}>{it.num}</Mono><div style={{flex:1,fontFamily:FONT.sans,fontSize:14,color:C.ink,fontWeight:500,lineHeight:1.35}}>{it.skill}</div><Mono size={10} color={C.ink2}>{it.pass}</Mono></Row></div>)}</div><Row gap={24} style={{marginTop:20}}><div><Mono size={10}>Pass</Mono><Serif size={32} style={{marginTop:2}}>80%</Serif></div><div><Mono size={10} color={C.crimson}>Excellent</Mono><Serif size={32} color={C.crimson} style={{marginTop:2}}>90%+</Serif></div></Row></Wrap>);
if(c.kind==='cert-cta')return(<Wrap><div style={{minHeight:440,display:'flex',flexDirection:'column',justifyContent:'center'}}><Kicker accent>Final step</Kicker><Serif size={64} style={{marginTop:12,marginBottom:18}}>{c.title}</Serif><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:22,color:C.ink2,lineHeight:1.4}}>{c.body}</div></div></Wrap>);
return(<Wrap><Serif size={36}>{c.title||'Lesson'}</Serif><div style={{marginTop:14,fontSize:16,color:C.ink2}}>{c.body}</div></Wrap>);}

function VsBlock({label,items,color,accent}){return(<div><Row gap={10} align="baseline" style={{marginBottom:10}}><Serif size={32} color={color}>{label}</Serif><Mono size={10} color={accent?C.crimson:C.muted}>{accent?'— styling':'— transactional'}</Mono></Row><Stack gap={0} style={{borderTop:'1px solid '+(accent?C.crimsonSoft:C.line2)}}>{items.map((it,i)=><div key={i} style={{padding:'10px 0',borderBottom:'1px solid '+(accent?C.crimsonSoft:C.line2),fontFamily:FONT.sans,fontSize:14,color:accent?C.ink:C.ink2,fontWeight:accent?500:400}}>{it}</div>)}</Stack></div>);}

function ScreenQuiz({t,m,onBack,onComplete}){const[idx,setIdx]=React.useState(0);const[picks,setPicks]=React.useState({});const[submitted,setSubmitted]=React.useState(false);const q=m.quiz[idx];const total=m.quiz.length;const picked=picks[idx];const submit=()=>setSubmitted(true);const next=()=>{if(idx<total-1){setIdx(idx+1);setSubmitted(false);}else{const correctCount=m.quiz.reduce((acc,qq,i)=>acc+(picks[i]===qq.correct?1:0),0);onComplete({correct:correctCount,total});}};return(<div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{padding:'10px 18px 0',flexShrink:0}}><Row justify="space-between" align="center" style={{marginBottom:14}}><IconBtn onClick={onBack} ariaLabel="back"><Icon name="close" size={16}/></IconBtn><Mono size={10}>{t.quiz} · {idx+1} {t.of} {total}</Mono></Row><div style={{display:'flex',gap:4}}>{m.quiz.map((_,i)=><div key={i} style={{flex:1,height:2,borderRadius:2,background:i<=idx?C.crimson:C.line2}}/>)}</div></div><ScreenScroll padBottom={20} style={{flex:1}}><div style={{padding:'24px 22px 24px'}}><Kicker accent>{t.question} {idx+1}</Kicker><Serif size={32} style={{marginTop:14,lineHeight:1.1}}>{q.q}</Serif><Stack gap={10} style={{marginTop:24}}>{q.options.map((opt,i)=>{const isPicked=picked===i;const isCorrect=submitted&&i===q.correct;const isWrong=submitted&&isPicked&&i!==q.correct;let bg=C.paper,bcol=C.line,col=C.ink;if(isCorrect){bg=C.crimson;bcol=C.crimson;col='#fff';}else if(isWrong){bg=C.crimsonSoft;bcol=C.crimson;col=C.ink;}else if(isPicked&&!submitted){bg=C.ink;bcol=C.ink;col=C.cream;}return(<button key={i} disabled={submitted} onClick={()=>setPicks({...picks,[idx]:i})} style={{width:'100%',textAlign:'start',padding:'14px 16px',background:bg,color:col,border:'1px solid '+bcol,borderRadius:12,fontFamily:FONT.sans,fontSize:15,fontWeight:500,letterSpacing:'-0.005em',cursor:submitted?'default':'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}><span>{opt}</span>{isCorrect&&<Icon name="check" size={18} color="#fff"/>}</button>);})}</Stack>{submitted&&<Card style={{marginTop:20,padding:16,background:picked===q.correct?'#fbf5f4':'#fff5f4',borderColor:C.crimson+'40'}}><Mono size={10} color={C.crimson} style={{marginBottom:6}}>{picked===q.correct?t.correct:t.incorrect}</Mono><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:17,color:C.ink,lineHeight:1.4}}>{picked===q.correct?'You got it. '+(q.why||''):'Correct answer: "'+q.options[q.correct]+'"'}</div></Card>}</div></ScreenScroll><div style={{padding:'10px 18px',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 18px)',flexShrink:0,background:C.cream,borderTop:'1px solid '+C.line2}}>{!submitted?<Btn variant="accent" disabled={picked===undefined} onClick={submit}>{t.submit}</Btn>:<Btn variant="accent" onClick={next} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{idx===total-1?'Finish':t.next}</Btn>}</div></div>);}

function ScreenResult({t,m,result,onContinue,onRetry,onHome}){const pct=Math.round((result.correct/result.total)*100);const passed=pct>=60;const excellent=pct>=90;return(<ScreenScroll><ChromeTag left={`M${m.num.toString().padStart(2,'0')} · ${m.title.toUpperCase()}`} right="QUIZ RESULT"/><div style={{padding:'40px 22px 24px',textAlign:'center'}}><Kicker accent style={{justifyContent:'center',display:'inline-flex'}}>{passed?t.passed:t.failed}</Kicker><div style={{marginTop:32}}><NumeralBadge size={180} color={excellent?C.crimson:passed?C.ink:C.muted}>{pct}<span style={{fontSize:80}}>%</span></NumeralBadge></div><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:24,color:C.ink2,marginTop:14}}>{result.correct} of {result.total} correct</div></div><div style={{padding:'20px 22px 0'}}><Card style={{padding:18}}><Row justify="space-between"><div><Mono size={10}>You earned</Mono><div style={{marginTop:4}}><span style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:38,color:C.crimson}}>+{result.correct*20}</span><span style={{fontFamily:FONT.sans,fontSize:14,color:C.ink2,marginLeft:8}}>{t.xp}</span></div></div>{excellent&&<div><Mono size={10} color={C.crimson}>Excellent</Mono><div style={{marginTop:4,fontFamily:FONT.serif,fontStyle:'italic',fontSize:30,color:C.crimson}}>★</div></div>}</Row></Card></div><div style={{padding:'28px 22px 30px'}}>{passed?<Btn variant="accent" onClick={onContinue} trailing={<Icon name="arrow" size={16} color="#fff"/>}>{t.continue}</Btn>:<Btn variant="accent" onClick={onRetry}>{t.retry}</Btn>}<Btn variant="ghost" onClick={onHome} style={{marginTop:10}}>{t.backToHome}</Btn></div></ScreenScroll>);}

function ScreenCertificate({t,state,onBack}){const date=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});return(<ScreenScroll><div style={{padding:'10px 18px 0'}}><Row justify="space-between" align="center"><IconBtn onClick={onBack} ariaLabel="back"><Icon name="arrowLeft" size={16}/></IconBtn><Mono size={10}>Certificate</Mono></Row></div><div style={{padding:'24px 18px'}}><div style={{background:'linear-gradient(180deg,#faf8f1 0%,#f1ecdf 100%)',border:'1px solid '+C.line,borderRadius:12,padding:'34px 24px',position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:16,left:16,right:16,bottom:16,border:'1px solid '+C.line,borderRadius:8,pointerEvents:'none'}}/><div style={{textAlign:'center',position:'relative'}}><Mono size={9} color={C.muted}>FWAD · ABUDHABI</Mono><Serif size={28} style={{marginTop:18}}>Certificate of</Serif><Serif size={28}>Completion.</Serif><div style={{width:36,height:1,background:C.crimson,margin:'20px auto'}}/><Mono size={10} color={C.muted}>Awarded to</Mono><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:38,color:C.ink,marginTop:12,lineHeight:1.1}}>{state.profile.name}</div><div style={{fontFamily:FONT.sans,fontSize:13,color:C.ink2,marginTop:8}}>{state.profile.branch}</div><div style={{width:36,height:1,background:C.crimson,margin:'20px auto'}}/><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:20,color:C.ink2,lineHeight:1.4,padding:'0 6px'}}>has completed Styling Fundamentals — all ten modules.</div><Row justify="space-between" style={{marginTop:32,padding:'0 6px'}}><div style={{textAlign:'left'}}><Mono size={9} color={C.muted}>Date</Mono><div style={{fontFamily:FONT.sans,fontSize:13,color:C.ink,marginTop:4}}>{date}</div></div><div style={{textAlign:'right'}}><Mono size={9} color={C.muted}>Score</Mono><div style={{fontFamily:FONT.sans,fontSize:13,color:C.crimson,marginTop:4}}>{state.xp} XP</div></div></Row><div style={{position:'absolute',top:-14,right:-8,width:54,height:54,borderRadius:999,background:C.crimson,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 12px rgba(139,38,32,.3)'}}><Icon name="medal" size={28} color="#fff"/></div></div></div></div><div style={{padding:'0 22px 30px'}}><Btn variant="accent" onClick={()=>{try{window.print();}catch(e){}}}>Save / Print</Btn><Btn variant="ghost" onClick={onBack} style={{marginTop:10}}>{t.backToHome}</Btn></div></ScreenScroll>);}

Object.assign(window,{ScreenAuth,ScreenHome,ScreenModule,ScreenLesson,ScreenQuiz,ScreenResult,ScreenCertificate});
</script>

<!-- ═══ SCREENS — TABS ═══ -->
<script type="text/babel">
function ScreenLeaderboard({t,state}){const meEntry={name:state.profile.name+' ('+t.rankYou+')',xp:state.xp,modules:state.completed.length,branch:state.profile.branch,isMe:true};const list=[...MOCK_TEAM,meEntry].sort((a,b)=>b.xp-a.xp);const myRank=list.findIndex(p=>p.isMe)+1;return(<ScreenScroll><ChromeTag left="FWAD · ABUDHABI" right="LEADERBOARD"/><div style={{padding:'24px 22px 12px'}}><Kicker accent>{t.leaderboard}</Kicker><Serif size={42} style={{marginTop:12}}>Top of the floor.</Serif></div><div style={{padding:'6px 22px 18px'}}><Card style={{background:C.ink,color:C.cream,padding:16}}><Row justify="space-between"><div><Mono color="rgba(255,255,255,.5)" size={10}>{t.yourRank}</Mono><div style={{marginTop:4}}><span style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:38,color:C.cream}}>#{myRank}</span><span style={{color:'rgba(255,255,255,.55)',marginLeft:8,fontFamily:FONT.sans,fontSize:12}}>of {list.length}</span></div></div><div style={{textAlign:'right'}}><Mono color="rgba(255,255,255,.5)" size={10}>{t.xp}</Mono><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:30,color:C.crimson,marginTop:4}}>{state.xp}</div></div></Row></Card></div><div style={{padding:'14px 22px 0'}}><Mono size={10} style={{marginBottom:10}}>This week · {list[0].branch}</Mono><Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{list.map((p,i)=>{const rank=i+1;return(<div key={i} style={{padding:'14px 22px',borderBottom:'1px solid '+C.line2,background:p.isMe?'#fbf5f4':'transparent',margin:'0 -22px'}}><Row gap={14} align="center"><div style={{width:32,textAlign:'center'}}>{rank<=3?<NumeralBadge size={30} color={rank===1?C.crimson:C.ink}>{rank}</NumeralBadge>:<Mono size={11} color={C.muted}>{rank.toString().padStart(2,'0')}</Mono>}</div><div style={{flex:1,minWidth:0}}><div style={{fontFamily:FONT.sans,fontSize:15,color:C.ink,fontWeight:p.isMe?600:500,letterSpacing:'-0.005em'}}>{p.name}</div><Mono size={9} style={{marginTop:4}}>{p.modules}/10 modules · {p.branch}</Mono></div><div style={{textAlign:'right'}}><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:22,color:p.isMe?C.crimson:C.ink}}>{p.xp}</div><Mono size={8}>{t.xp}</Mono></div></Row></div>);})}</Stack></div></ScreenScroll>);}

function ScreenChat({t,state}){const[messages,setMessages]=React.useState(state.chat||[{role:'assistant',text:'I\'m your styling assistant. Ask me anything about fit, color, accessories, or the styling conversation.'}]);const[input,setInput]=React.useState('');const[loading,setLoading]=React.useState(false);const endRef=React.useRef(null);React.useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth',block:'end'});},[messages,loading]);const send=async(text)=>{const q=text||input.trim();if(!q||loading)return;setInput('');const newMsgs=[...messages,{role:'user',text:q}];setMessages(newMsgs);setLoading(true);try{const system=`You are a brief, practical Ferrari retail styling assistant for Ferrari World Abu Dhabi staff. Your knowledge comes from the Styling Fundamentals training: styling is not selling; one hero piece per look; Ferrari red is an accent not a base; neutrals (black/white/navy) form the base; fit is the #1 luxury signal; 1-2 accessories maximum; always recommend footwear; ask 2-3 discovery questions; recommend with reasoning ("This adds a subtle Ferrari touch…"). Avoid pushy or transactional language. Keep answers to 2-3 short sentences max. Conversational, warm, confident.`;const conversation=newMsgs.map(m=>`${m.role==='user'?'Staff':'Assistant'}: ${m.text}`).join('\n\n');const prompt=`${system}\n\n${conversation}\n\nAssistant:`;const reply=await window.claude.complete(prompt);setMessages([...newMsgs,{role:'assistant',text:reply.trim()}]);}catch(e){setMessages([...newMsgs,{role:'assistant',text:'I couldn\'t reach the assistant. Try again in a moment.'}]);}finally{setLoading(false);}};React.useEffect(()=>{if(state.setChat)state.setChat(messages);},[messages]);return(<div style={{height:'100%',display:'flex',flexDirection:'column'}}><div style={{padding:'20px 22px 12px',flexShrink:0,borderBottom:'1px solid '+C.line2}}><Row justify="space-between" align="center"><div><Kicker accent>{t.chat}</Kicker><Serif size={26} style={{marginTop:6}}>{t.chatTitle}</Serif></div><div style={{width:40,height:40,borderRadius:999,background:C.crimson,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="sparkle" size={20} color="#fff"/></div></Row></div><div style={{flex:1,overflowY:'auto',padding:'16px 18px 20px'}}><Stack gap={10}>{messages.map((m,i)=><div key={i} style={{alignSelf:m.role==='user'?'flex-end':'flex-start',maxWidth:'85%',padding:'12px 14px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?C.ink:C.paper,color:m.role==='user'?C.cream:C.ink,border:'1px solid '+(m.role==='user'?C.ink:C.line2),fontFamily:FONT.sans,fontSize:14,lineHeight:1.45,letterSpacing:'-0.005em'}}>{m.text}</div>)}{loading&&<div style={{alignSelf:'flex-start',padding:'12px 14px',borderRadius:'16px 16px 16px 4px',background:C.paper,border:'1px solid '+C.line2,display:'flex',gap:4}}>{[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:999,background:C.muted,animation:`dot 1s ease ${i*0.15}s infinite`}}/>)}</div>}<div ref={endRef}/></Stack>{messages.length<=1&&<div style={{marginTop:22}}><Mono size={9} style={{marginBottom:10}}>{t.suggested}</Mono><Stack gap={8}>{CHAT_SUGGESTIONS.map((s,i)=><button key={i} onClick={()=>send(s)} style={{textAlign:'start',padding:'12px 14px',background:C.paper,border:'1px solid '+C.line2,borderRadius:14,fontFamily:FONT.serif,fontStyle:'italic',fontSize:14,color:C.ink,cursor:'pointer'}}>"{s}"</button>)}</Stack></div>}</div><div style={{padding:'10px 16px 16px',flexShrink:0,borderTop:'1px solid '+C.line2,background:C.cream}}><form onSubmit={e=>{e.preventDefault();send();}} style={{display:'flex',gap:8,alignItems:'center'}}><input value={input} onChange={e=>setInput(e.target.value)} placeholder={t.chatPlaceholder} style={{flex:1,padding:'12px 16px',background:C.paper,border:'1px solid '+C.line,borderRadius:999,color:C.ink,fontFamily:FONT.sans,fontSize:14,boxSizing:'border-box'}}/><button type="submit" disabled={!input.trim()||loading} style={{width:44,height:44,borderRadius:999,background:C.crimson,color:'#fff',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',opacity:(!input.trim()||loading)?0.45:1}}><Icon name="send" size={18} color="#fff"/></button></form></div></div>);}

function ScreenProfile({t,state,lang,setLang,onSignOut,onManager,onCertificate,onReference}){const completedCount=state.completed.length;const hasCert=completedCount===MODULES.length;return(<ScreenScroll><ChromeTag left="FWAD · ABUDHABI" right="PROFILE"/><div style={{padding:'24px 22px 8px'}}><Kicker accent>{t.profileTitle}</Kicker></div><div style={{padding:'12px 22px 18px'}}><Card style={{padding:22}}><Row gap={16} align="center"><div style={{width:64,height:64,borderRadius:999,background:C.ink,color:C.cream,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:FONT.serif,fontStyle:'italic',fontSize:30}}>{state.profile.name.charAt(0).toUpperCase()}</div><div style={{flex:1,minWidth:0}}><Serif size={28} style={{marginBottom:4}}>{state.profile.name}</Serif><Mono size={10}>{state.profile.branch}</Mono></div></Row><div style={{marginTop:22,paddingTop:20,borderTop:'1px solid '+C.line2}}><Row gap={20}><ProfileStat label={t.modulesComplete} value={`${completedCount}/${MODULES.length}`}/><ProfileStat label={t.xp} value={state.xp} accent/><ProfileStat label="day" value="1" suffix={t.streak}/></Row></div></Card></div>{hasCert&&<div style={{padding:'0 22px 18px'}}><Card onClick={onCertificate} style={{padding:18,background:'linear-gradient(135deg,#fbf5f4,#f3d8d4)',borderColor:C.crimson+'40'}}><Row justify="space-between" align="center"><div><Mono size={10} color={C.crimson}>{t.certEarned}</Mono><Serif size={26} style={{marginTop:4}}>Styling Fundamentals</Serif></div><Icon name="arrow" size={18} color={C.crimson}/></Row></Card></div>}<div style={{padding:'8px 22px 16px'}}><Mono size={10} style={{marginBottom:10}}>{t.settings}</Mono><SettingRow label={t.reference} control={<Icon name="arrow" size={18} color={C.ink}/>} onClick={onReference}/><SettingRow label={t.language} control={<LangToggle lang={lang} setLang={setLang}/>}/><SettingRow label={t.managerView} control={<Icon name="arrow" size={18} color={C.ink}/>} onClick={onManager}/><SettingRow label={t.signOut} control={<Icon name="arrow" size={18} color={C.crimson}/>} danger onClick={onSignOut}/></div><div style={{padding:'0 22px 30px',opacity:.7}}><Mono size={9} color={C.muted}>v01 · 2026 · INTERNAL</Mono></div></ScreenScroll>);}

function ProfileStat({label,value,suffix,accent}){return(<div style={{flex:1}}><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:32,color:accent?C.crimson:C.ink,lineHeight:1}}>{value}</div><Mono size={9} style={{marginTop:6}}>{suffix?`${suffix}`:label}</Mono></div>);}
function SettingRow({label,control,onClick,danger}){return(<div onClick={onClick} style={{padding:'16px 0',borderBottom:'1px solid '+C.line2,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:onClick?'pointer':'default'}}><div style={{fontFamily:FONT.sans,fontSize:15,color:danger?C.crimson:C.ink,fontWeight:500}}>{label}</div>{control}</div>);}
function LangToggle({lang,setLang}){return(<div style={{display:'flex',background:'#0000000a',borderRadius:999,padding:3}}>{[{k:'en',label:'EN'},{k:'ar',label:'AR'}].map(l=><button key={l.k} onClick={()=>setLang(l.k)} style={{padding:'6px 14px',borderRadius:999,border:'none',background:lang===l.k?C.ink:'transparent',color:lang===l.k?C.cream:C.ink,fontFamily:FONT.mono,fontSize:11,fontWeight:500,letterSpacing:'0.08em',cursor:'pointer'}}>{l.label}</button>)}</div>);}

function ScreenManager({t,state,onBack}){const list=[...MOCK_TEAM,{name:state.profile.name,xp:state.xp,modules:state.completed.length,branch:state.profile.branch,isMe:true}];const avgComplete=Math.round(list.reduce((acc,p)=>acc+p.modules/10,0)/list.length*100);const certified=list.filter(p=>p.modules===10).length;const inProgress=list.filter(p=>p.modules>0&&p.modules<10).length;return(<ScreenScroll><div style={{padding:'10px 18px 0'}}><Row justify="space-between" align="center"><IconBtn onClick={onBack} ariaLabel="back"><Icon name="arrowLeft" size={16}/></IconBtn><Mono size={10}>Manager View</Mono></Row></div><div style={{padding:'20px 22px 12px'}}><Kicker accent>FWAD · Main floor</Kicker><Serif size={42} style={{marginTop:12}}>{t.teamProgress}.</Serif></div><div style={{padding:'12px 22px 0'}}><Row gap={10}><ManagerStat value={`${avgComplete}%`} label="avg complete" accent/><ManagerStat value={certified} label="certified"/><ManagerStat value={inProgress} label="in progress"/></Row></div><div style={{padding:'24px 22px 0'}}><Mono size={10} style={{marginBottom:12}}>By module · % of staff complete</Mono><Stack gap={10}>{MODULES.map((m,i)=>{const pct=Math.max(5,Math.round(100-i*9));return(<div key={m.id}><Row justify="space-between" style={{marginBottom:4}}><div style={{fontFamily:FONT.sans,fontSize:13,color:C.ink}}><span style={{color:C.crimson,fontFamily:FONT.mono,marginRight:8}}>{m.num.toString().padStart(2,'0')}</span>{m.title}</div><Mono size={10}>{pct}%</Mono></Row><ProgressBar value={pct} total={100} accent={pct<50} height={3}/></div>);})}</Stack></div><div style={{padding:'28px 22px 0'}}><Mono size={10} style={{marginBottom:12}}>Team · {list.length}</Mono><Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{list.sort((a,b)=>b.modules-a.modules).map((p,i)=><div key={i} style={{padding:'12px 0',borderBottom:'1px solid '+C.line2}}><Row gap={10} align="center"><div style={{width:32,height:32,borderRadius:999,background:p.modules===10?C.crimson:C.ink2,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:FONT.sans,fontSize:13,fontWeight:500,flexShrink:0}}>{p.name.charAt(0)}</div><div style={{flex:1,minWidth:0}}><div style={{fontFamily:FONT.sans,fontSize:14,color:C.ink,fontWeight:p.isMe?600:500}}>{p.name}{p.isMe?' (you)':''}</div><Mono size={9}>{p.branch}</Mono></div><div style={{minWidth:80}}><ProgressBar value={p.modules} total={10} accent={p.modules===10} height={3}/><Mono size={9} style={{marginTop:4,textAlign:'right'}}>{p.modules}/10</Mono></div></Row></div>)}</Stack></div></ScreenScroll>);}

function ManagerStat({value,label,accent}){return(<Card style={{flex:1,padding:14,textAlign:'center'}}><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:36,color:accent?C.crimson:C.ink,lineHeight:1}}>{value}</div><Mono size={9} style={{marginTop:6}}>{label}</Mono></Card>);}

function NavBar({tab,setTab,t}){const items=[{k:'home',icon:'home',label:t.home},{k:'lb',icon:'trophy',label:t.leaderboard},{k:'chat',icon:'chat',label:t.chat},{k:'profile',icon:'user',label:t.profile}];return(<div style={{position:'absolute',left:0,right:0,bottom:0,paddingBottom:'env(safe-area-inset-bottom,8px)',paddingTop:8,background:'rgba(246,244,237,0.92)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderTop:'1px solid '+C.line2,zIndex:100}}><Row gap={0} justify="space-around">{items.map(i=>{const active=tab===i.k;return(<button key={i.k} onClick={()=>setTab(i.k)} style={{flex:1,background:'transparent',border:'none',padding:'8px 4px 4px',display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',color:active?C.crimson:C.muted,fontFamily:FONT.mono,fontSize:9,letterSpacing:'0.1em',textTransform:'uppercase'}}><Icon name={i.icon} size={20} color={active?C.crimson:C.muted}/><span>{i.label}</span></button>);})}</Row></div>);}

function ScreenReference({t,state,onBack}){const[section,setSection]=React.useState('principles');const sections=[{k:'principles',label:t.principles},{k:'glossary',label:t.glossary},{k:'staff',label:t.forStaff}];return(<ScreenScroll padBottom={50}><div style={{padding:'10px 18px 0'}}><Row justify="space-between" align="center"><IconBtn onClick={onBack} ariaLabel="back"><Icon name="arrowLeft" size={16}/></IconBtn><Mono size={10}>{t.reference}</Mono></Row></div><div style={{padding:'20px 22px 4px'}}><Kicker accent>{t.reference}</Kicker><Serif size={42} style={{marginTop:10}}>{t.referenceTitle}.</Serif><div style={{fontFamily:FONT.serif,fontStyle:'italic',fontSize:18,color:C.ink2,marginTop:10,lineHeight:1.4}}>Everything you need on the floor — at a glance.</div></div><div style={{padding:'20px 22px 4px',display:'flex',gap:6,overflowX:'auto'}}>{sections.map(s=>{const active=section===s.k;return(<button key={s.k} onClick={()=>setSection(s.k)} style={{padding:'8px 14px',borderRadius:999,background:active?C.ink:'transparent',color:active?C.cream:C.ink,border:'1px solid '+(active?C.ink:C.line),fontFamily:FONT.mono,fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',cursor:'pointer',whiteSpace:'nowrap'}}>{s.label}</button>);})}</div>{section==='principles'&&<div style={{padding:'18px 22px 0'}}><Stack gap={10}>{REFERENCE.principles.map((p,i)=><Card key={i} style={{padding:16}}><Row gap={14} align="flex-start"><NumeralBadge size={36} color={C.crimson}>{(i+1).toString().padStart(2,'0')}</NumeralBadge><div style={{flex:1}}><Serif size={22}>{p.name}.</Serif><div style={{fontFamily:FONT.sans,fontSize:14,color:C.ink2,lineHeight:1.45,marginTop:6}}>{p.body}</div></div></Row></Card>)}</Stack></div>}{section==='glossary'&&<div style={{padding:'18px 22px 0'}}><Stack gap={0} style={{borderTop:'1px solid '+C.line2}}>{REFERENCE.glossary.map((g,i)=><div key={i} style={{padding:'16px 0',borderBottom:'1px solid '+C.line2}}><Serif size={22} style={{marginBottom:4}}>{g.term}.</Serif><div style={{fontFamily:FONT.sans,fontSize:14,color:C.ink2,lineHeight:1.45}}>{g.def}</div></div>)}</Stack></div>}{section==='staff'&&<div style={{padding:'18px 22px 0'}}><Mono size={10} style={{marginBottom:10}}>{t.forStaff}</Mono><Stack gap={10}>{REFERENCE.staffActions.map((a,i)=><Card key={i} style={{padding:14}}><Row gap={12} align="flex-start"><Mono size={12} color={C.crimson} style={{width:24,paddingTop:2}}>{(i+1).toString().padStart(2,'0')}</Mono><div style={{flex:1,fontFamily:FONT.sans,fontSize:15,color:C.ink,lineHeight:1.45}}>{a}</div></Row></Card>)}</Stack><Mono size={10} style={{margin:'24px 0 10px'}}>{t.forManagers}</Mono><Stack gap={10}>{REFERENCE.managerActions.map((a,i)=><Card key={i} style={{padding:14,background:C.cream2}}><Row gap={12} align="flex-start"><Mono size={12} color={C.ink2} style={{width:24,paddingTop:2}}>{(i+1).toString().padStart(2,'0')}</Mono><div style={{flex:1,fontFamily:FONT.sans,fontSize:14,color:C.ink2,lineHeight:1.45}}>{a}</div></Row></Card>)}</Stack></div>}</ScreenScroll>);}

Object.assign(window,{ScreenLeaderboard,ScreenChat,ScreenProfile,ScreenManager,ScreenReference,NavBar});
</script>

<!-- ═══ APP ROOT ═══ -->
<script type="text/babel">
const STORAGE_KEY='styling-training-v1';
const initialState={signedIn:false,profile:{name:'',branch:'FWAD Main'},completed:[],scores:{},xp:0,lang:'en',chat:null};
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return initialState;return{...initialState,...JSON.parse(raw)};}catch(e){return initialState;}}
function saveState(s){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}

function App(){const[state,setState]=React.useState(loadState);const[route,setRoute]=React.useState({name:'home'});const[tab,setTab]=React.useState('home');React.useEffect(()=>{saveState(state);},[state]);const activeModule=route.moduleId?MODULES.find(m=>m.id===route.moduleId):null;const t=STRINGS[state.lang]||STRINGS.en;const isRtl=state.lang==='ar';const setLang=lang=>setState(s=>({...s,lang}));const join=({name,branch})=>setState(s=>({...s,signedIn:true,profile:{name,branch}}));const signOut=()=>{if(!confirm('Sign out? Your progress will be cleared on this device.'))return;localStorage.removeItem(STORAGE_KEY);setState(initialState);setRoute({name:'home'});setTab('home');};const openModule=id=>setRoute({name:'module',moduleId:id});const startLesson=()=>setRoute({...route,name:'lesson'});const goQuiz=()=>setRoute({...route,name:'quiz'});const finishQuiz=result=>{const mId=route.moduleId;const passed=result.correct/result.total>=0.6;setState(s=>{const completed=passed&&!s.completed.includes(mId)?[...s.completed,mId]:s.completed;const xp=passed?s.xp+result.correct*20+(s.completed.includes(mId)?0:50):s.xp;return{...s,completed,scores:{...s.scores,[mId]:result},xp};});setRoute({...route,name:'result',result});};const chatBound={...state,setChat:msgs=>setState(s=>({...s,chat:msgs}))};
if(!state.signedIn)return(<div style={{height:'100%',direction:isRtl?'rtl':'ltr'}}><ScreenAuth t={t} onJoin={join}/></div>);
let screen;
if(route.name==='home'){if(tab==='home')screen=<ScreenHome t={t} state={state} onOpenModule={openModule}/>;else if(tab==='lb')screen=<ScreenLeaderboard t={t} state={state}/>;else if(tab==='chat')screen=<ScreenChat t={t} state={chatBound}/>;else if(tab==='profile')screen=<ScreenProfile t={t} state={state} lang={state.lang} setLang={setLang} onSignOut={signOut} onManager={()=>setRoute({name:'manager'})} onCertificate={()=>setRoute({name:'certificate'})} onReference={()=>setRoute({name:'reference'})}/>;}
else if(route.name==='module'&&activeModule)screen=<ScreenModule t={t} m={activeModule} state={state} onBack={()=>setRoute({name:'home'})} onStartLesson={startLesson} onQuiz={goQuiz}/>;
else if(route.name==='lesson'&&activeModule)screen=<ScreenLesson t={t} m={activeModule} onBack={()=>setRoute({name:'module',moduleId:activeModule.id})} onComplete={goQuiz}/>;
else if(route.name==='quiz'&&activeModule)screen=<ScreenQuiz t={t} m={activeModule} onBack={()=>setRoute({name:'module',moduleId:activeModule.id})} onComplete={finishQuiz}/>;
else if(route.name==='result'&&activeModule)screen=<ScreenResult t={t} m={activeModule} result={route.result} onContinue={()=>{const i=MODULES.findIndex(m=>m.id===activeModule.id);if(i<MODULES.length-1)setRoute({name:'module',moduleId:MODULES[i+1].id});else setRoute({name:'certificate'});}} onRetry={()=>setRoute({...route,name:'quiz'})} onHome={()=>{setTab('home');setRoute({name:'home'});}}/>;
else if(route.name==='certificate')screen=<ScreenCertificate t={t} state={state} onBack={()=>{setTab('profile');setRoute({name:'home'});}}/>;
else if(route.name==='manager')screen=<ScreenManager t={t} state={state} onBack={()=>{setTab('profile');setRoute({name:'home'});}}/>;
else if(route.name==='reference')screen=<ScreenReference t={t} state={state} onBack={()=>{setTab('profile');setRoute({name:'home'});}}/>;
else screen=<ScreenHome t={t} state={state} onOpenModule={openModule}/>;
const showNav=route.name==='home';
return(<div style={{height:'100%',position:'relative',overflow:'hidden',background:C.cream,direction:isRtl?'rtl':'ltr'}}>{screen}{showNav&&<NavBar tab={tab} setTab={setTab} t={t}/>}</div>);}
window.App=App;
</script>

<!-- ═══ MOUNT ═══ -->
<script type="text/babel">
function tryMount(){
  if(typeof App==='undefined'||typeof MODULES==='undefined'){setTimeout(tryMount,50);return;}
  const mount=document.getElementById('app-mount');
  ReactDOM.createRoot(mount).render(
    <div style={{height:'100%',width:'100%',background:'#f6f4ed',paddingTop:'env(safe-area-inset-top,0px)',boxSizing:'border-box'}}>
      <App/>
    </div>
  );
}
tryMount();
</script>

</body>
